name: Daily data update

on:
  schedule:
    # 22:00 UTC ≈ 06:00 Asia/Shanghai — after US close, data available on MacroMicro
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch, build, commit
        env:
          SCRAPINGANT_API_KEY: ${{ secrets.SCRAPINGANT_API_KEY }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if ! python fetch.py; then
            echo "::warning::fetch.py (MacroMicro) failed — skipping refresh this run."
            exit 0
          fi
          if ! python fetch_trailing.py; then
            echo "::warning::fetch_trailing.py (worldperatio) failed — continuing with stale trailing data."
          fi
          python build_html.py
          git add -A data/ index.html
          if git diff --cached --quiet; then
            echo "No data changes today."
            exit 0
          fi
          git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
          git push
